<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critical Thinking Through Literature for Schools | Jurassic English™</title>
    <meta name="description" content="Jurassic English™ is a literature-based critical thinking curriculum for schools. Five structured levels from Pre-A1 to C1, covering ages 4–14+. Teacher training, school licensing, and curriculum review." />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jurassic English™" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:title" content="Critical Thinking Through Literature for Schools | Jurassic English™" />
    <meta property="og:description" content="Jurassic English™ is a literature-based critical thinking curriculum for schools. Five structured levels from Pre-A1 to C1, covering ages 4–14+. Teacher training, school licensing, and curriculum review." />
    <meta property="og:url" content="https://jurassicenglish.com" />
    <meta property="og:image" content="https://jurassicenglish.com/images/hero-compass.jpg" />
    <meta property="og:image:alt" content="Jurassic English™ — Critical Thinking Through Literature for Schools" />
    <meta property="og:image:type" content="image/jpeg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Critical Thinking Through Literature for Schools | Jurassic English™" />
    <meta name="twitter:description" content="Jurassic English™ is a literature-based critical thinking curriculum for schools. Five structured levels from Pre-A1 to C1, covering ages 4–14+." />
    <meta name="twitter:image" content="https://jurassicenglish.com/images/hero-compass.jpg" />
    <meta name="twitter:image:alt" content="Jurassic English™ — Critical Thinking Through Literature for Schools" />

    <!-- LCP hero image — preload the same responsive WebP candidates used by the hero. -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-compass-1024.webp"
      type="image/webp"
      imagesrcset="/images/hero-compass-640.webp 640w, /images/hero-compass-960.webp 960w, /images/hero-compass-1024.webp 1024w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- Decorative display font loads asynchronously; core text uses local system stacks for first paint. -->
    <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://db.onlinewebfonts.com/c/3000a0539c78d3cf6ab2d94db856f5ef?family=Neuland-Inline"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/3000a0539c78d3cf6ab2d94db856f5ef?family=Neuland-Inline" />
    </noscript>

    <!-- Favicon & touch icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#101820" />

    <!-- P1-A critical inline CSS: dark background prevents white flash while the
         async Tailwind stylesheet loads. The loading spinner uses only inline
         styles so no other declarations are needed for the pre-React paint. -->
    <style>html,body{background:#101820;margin:0}#root{min-height:100vh}</style>
  </head>
  <body>
    <div id="root">
      <!-- Minimal loading indicator replaced by React on mount -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#101820;">
        <div style="text-align:center;color:#F26419;font-family:Aptos, Segoe UI, Helvetica Neue, Arial, sans-serif;">
          <div style="font-size:2rem;font-weight:bold;letter-spacing:-0.02em;">Jurassic English™</div>
          <div style="margin-top:0.5rem;font-size:0.75rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.2em;">Loading</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
